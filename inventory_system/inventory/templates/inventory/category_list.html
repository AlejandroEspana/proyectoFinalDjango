{% extends 'base.html' %}
{% block content %}
<h2>Categories</h2>
<a href="{% url 'inventory:category_create' %}">Create New Category</a>
<ul>
    {% for category in categories %}
    <li>
        {{ category.name }}
        <a href="{% url 'inventory:category_update' category.pk %}">Edit</a>
        <a href="{% url 'inventory:category_delete' category.pk %}">Delete</a>
    </li>
    {% empty %}
    <li>No categories found.</li>
    {% endfor %}
</ul>
{% endblock %}
