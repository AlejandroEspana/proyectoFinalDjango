{% extends 'base.html' %}
{% block content %}
<h2>Suppliers</h2>
<a href="{% url 'inventory:supplier_create' %}">Create New Supplier</a>
<ul>
    {% for supplier in suppliers %}
    <li>
        {{ supplier.name }} - {{ supplier.email }}
        <a href="{% url 'inventory:supplier_update' supplier.pk %}">Edit</a>
        <a href="{% url 'inventory:supplier_delete' supplier.pk %}">Delete</a>
    </li>
    {% empty %}
    <li>No suppliers found.</li>
    {% endfor %}
</ul>
{% endblock %}
